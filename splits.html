<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splits - Baseball Stats</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📊 Splits</h1>
    <nav>
      <a href="./">Personal Stats</a>
      <a href="gamelogs/">Game Logs</a>
      <a href="royals/">WS Royals</a>
    </nav>
  </header>

  <main>
    <section id="filters">
      <label>Year:
        <select id="yearFilter"><option value="">All</option></select>
      </label>
      <label>Team:
        <select id="teamFilter"><option value="">All</option></select>
      </label>
    </section>

    <section id="splits">
      <div id="splitTabs" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="split-tab active" onclick="showSplit('field', this)">By Field</button>
        <button class="split-tab" onclick="showSplit('opponent', this)">By Opponent</button>
        <button class="split-tab" onclick="showSplit('daynight', this)">Day / Night</button>
        <button class="split-tab" onclick="showSplit('team', this)">By Team</button>
        <button class="split-tab" onclick="showSplit('time', this)">By Time</button>
      </div>
      <div class="table-wrap">
        <table id="splitsTable">
          <thead><tr>
            <th class="sortable" data-col="label">Split</th>
            <th class="sortable" data-col="g">G</th>
            <th class="sortable" data-col="ab">AB</th>
            <th class="sortable" data-col="h">H</th>
            <th class="sortable" data-col="doubles">2B</th>
            <th class="sortable" data-col="triples">3B</th>
            <th class="sortable" data-col="hr">HR</th>
            <th class="sortable" data-col="rbi">RBI</th>
            <th class="sortable" data-col="r">R</th>
            <th class="sortable" data-col="bb">BB</th>
            <th class="sortable" data-col="k">K</th>
            <th class="sortable" data-col="sb">SB</th>
            <th class="sortable" data-col="avg">AVG</th>
            <th class="sortable" data-col="obp">OBP</th>
            <th class="sortable" data-col="slg">SLG</th>
            <th class="sortable" data-col="ops">OPS</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const GAME_YEARS = [2025, 2026];
    let allGames = [];
    let currentSplit = 'field';
    let sortCol = 'avg';
    let sortDir = 'desc'; // desc = highest first

    // Sort header click handler
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('sortable')) {
        const col = e.target.dataset.col;
        if (sortCol === col) {
          sortDir = sortDir === 'desc' ? 'asc' : 'desc';
        } else {
          sortCol = col;
          sortDir = col === 'label' ? 'asc' : 'desc'; // text defaults A-Z, numbers default high-low
        }
        renderSplits();
      }
    });

    // KC sunset times by month (approximate, 24h decimal)
    const KC_SUNSETS = {
      1:17.25, 2:18.0, 3:19.5, 4:20.0, 5:20.5, 6:20.75,
      7:20.75, 8:20.25, 9:19.5, 10:18.75, 11:17.25, 12:17.0
    };

    function parseTime(timeStr) {
      if (!timeStr) return null;
      const m = timeStr.match(/(\d+):(\d+)\s*(am|pm)/i);
      if (!m) return null;
      let h = parseInt(m[1]); const min = parseInt(m[2]); const ampm = m[3].toLowerCase();
      if (ampm === 'pm' && h !== 12) h += 12;
      if (ampm === 'am' && h === 12) h = 0;
      return h + min / 60;
    }

    function getDayNight(game) {
      const time = parseTime(game.time);
      if (time === null) return 'Unknown';
      const month = parseInt(game.date.split('-')[1]);
      const sunset = KC_SUNSETS[month] || 19.5;
      return (sunset >= time + 0.75) ? 'Day' : 'Night';
    }

    function computeSplits(games, keyFn) {
      const groups = {};
      games.forEach(g => {
        const key = keyFn(g);
        if (!key) return;
        if (!groups[key]) groups[key] = [];
        groups[key].push(g);
      });
      const rows = [];
      for (const [label, gms] of Object.entries(groups)) {
        const ab = gms.reduce((s, g) => s + g.ab, 0);
        const h = gms.reduce((s, g) => s + g.h, 0);
        const doubles = gms.reduce((s, g) => s + (g['2b'] || 0), 0);
        const triples = gms.reduce((s, g) => s + (g['3b'] || 0), 0);
        const hr = gms.reduce((s, g) => s + (g.hr || 0), 0);
        const rbi = gms.reduce((s, g) => s + (g.rbi || 0), 0);
        const r = gms.reduce((s, g) => s + (g.r || 0), 0);
        const bb = gms.reduce((s, g) => s + (g.bb || 0), 0);
        const k = gms.reduce((s, g) => s + (g.k || 0), 0);
        const sb = gms.reduce((s, g) => s + (g.sb || 0), 0);
        const hbp = gms.reduce((s, g) => s + (g.hb || 0), 0);
        const tb = h + doubles + 2 * triples + 3 * hr;
        const pa = ab + bb + hbp;
        const avg = ab ? (h / ab) : 0;
        const obp = pa ? ((h + bb + hbp) / pa) : 0;
        const slg = ab ? (tb / ab) : 0;
        const ops = obp + slg;
        rows.push({ label, g: gms.length, ab, h, doubles, triples, hr, rbi, r, bb, k, sb, avg, obp, slg, ops });
      }
      return rows.sort((a, b) => b.avg - a.avg);
    }

    function showSplit(type, btn) {
      currentSplit = type;
      document.querySelectorAll('.split-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderSplits();
    }

    function renderSplits() {
      const year = document.getElementById('yearFilter').value;
      const team = document.getElementById('teamFilter').value;
      const filtered = allGames.filter(g => {
        if (year && g.year !== +year) return false;
        if (team && g.team !== team) return false;
        return true;
      });

      let keyFn;
      switch (currentSplit) {
        case 'field': keyFn = g => g.field || 'Unknown'; break;
        case 'opponent': keyFn = g => g.opponent || 'Unknown'; break;
        case 'daynight': keyFn = g => getDayNight(g); break;
        case 'team': keyFn = g => g.team || 'Unknown'; break;
        case 'time': keyFn = g => g.time || 'Unknown'; break;
      }

      const rows = computeSplits(filtered, keyFn);
      // Sort
      rows.sort((a, b) => {
        const av = a[sortCol], bv = b[sortCol];
        if (typeof av === 'string') {
          return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
        }
        return sortDir === 'asc' ? av - bv : bv - av;
      });
      // Update header arrows
      document.querySelectorAll('.sortable').forEach(th => {
        const arrow = th.dataset.col === sortCol ? (sortDir === 'desc' ? ' ▼' : ' ▲') : '';
        th.textContent = th.textContent.replace(/ [▼▲]$/, '') + arrow;
      });
      const tbody = document.querySelector('#splitsTable tbody');
      tbody.innerHTML = rows.map(r => `<tr>
        <td style="text-align:left;font-weight:500">${r.label}</td>
        <td>${r.g}</td><td>${r.ab}</td><td>${r.h}</td><td>${r.doubles}</td><td>${r.triples}</td><td>${r.hr}</td>
        <td>${r.rbi}</td><td>${r.r}</td><td>${r.bb}</td><td>${r.k}</td><td>${r.sb}</td>
        <td><strong>${r.avg.toFixed(3)}</strong></td><td>${r.obp.toFixed(3)}</td><td>${r.slg.toFixed(3)}</td><td>${r.ops.toFixed(3)}</td>
      </tr>`).join('') || '<tr><td colspan="16" style="text-align:center;color:#888">No data</td></tr>';
    }

    function populateFilters() {
      const years = [...new Set(allGames.map(g => g.year))].sort();
      const teams = [...new Set(allGames.map(g => g.team))].sort();
      const yf = document.getElementById('yearFilter');
      years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yf.appendChild(o); });
      const tf = document.getElementById('teamFilter');
      teams.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tf.appendChild(o); });
    }

    async function init() {
      const results = await Promise.all(
        GAME_YEARS.map(y => fetch(`data/personal/games/${y}.json`).then(r => r.ok ? r.json() : []).catch(() => []))
      );
      GAME_YEARS.forEach((y, i) => {
        results[i].forEach(g => allGames.push({...g, year: y}));
      });
      populateFilters();
      renderSplits();
      document.getElementById('yearFilter').addEventListener('change', renderSplits);
      document.getElementById('teamFilter').addEventListener('change', renderSplits);
    }

    init();
  </script>
</body>
</html>
